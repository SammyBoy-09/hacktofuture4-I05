<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Dismantle Animation Test</title>
    <style>
        body { 
            margin: 0; 
            /* To allow scrolling, we need a tall body. Let's make it 3 screens tall. */
            height: 300vh; 
            background: radial-gradient(circle at 50% 50%, #5a5a5a, #2b2b2b); /* Blender-style viewport background */
            font-family: sans-serif;
            overflow-x: hidden;
        }

        /* Fix the 3D canvas to the screen so it doesn't scroll away */
        canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
            pointer-events: auto; /* Let OrbitControls still work for panning/rotating */
        }

        /* Optional: Add a scroll indicator styling */
        #scroll-indicator {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: #ffffff;
            font-size: 16px;
            opacity: 0.8;
            pointer-events: none;
            animation: bounce 2s infinite;
        }
        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% { transform: translateY(0) translateX(-50%); }
            40% { transform: translateY(-15px) translateX(-50%); }
            60% { transform: translateY(-7px) translateX(-50%); }
        }
        #ui-container { 
            position: absolute; 
            bottom: 30px; 
            left: 50%; 
            transform: translateX(-50%); 
            display: flex; 
            gap: 15px; 
            z-index: 10; 
        }
        button { 
            padding: 12px 24px; 
            font-size: 16px; 
            cursor: pointer; 
            border: none; 
            border-radius: 6px; 
            background: #ffffff; 
            color: #1a1a1a; 
            font-weight: bold; 
            transition: 0.2s ease;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        button:hover { 
            background: #e0e0e0; 
            transform: translateY(-2px); 
        }
        #loading { 
            position: absolute; 
            top: 50%; 
            left: 50%; 
            transform: translate(-50%, -50%); 
            color: white; 
            font-size: 20px; 
        }
        #back-to-dashboard {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 100;
            padding: 10px 20px;
            font-size: 14px;
            cursor: pointer;
            border: none;
            border-radius: 6px;
            background: #00c8c8;
            color: #000;
            font-weight: bold;
            transition: 0.2s ease;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        #back-to-dashboard:hover {
            background: #00e8e8;
            transform: translateY(-2px);
        }
        #arsenal-nav {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: none; /* hidden until max scroll */
            gap: 20px;
            z-index: 100;
        }
        #arsenal-nav button {
            padding: 10px 20px;
            font-size: 14px;
            background: #ffffff;
            color: #1a1a1a;
        }
    </style>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/",
                "animejs": "https://cdn.jsdelivr.net/npm/animejs@3.2.2/lib/anime.es.js"
            }
        }
    </script>
</head>
<body>
    <button id="back-to-dashboard" onclick="window.top.location.href='/'">Back to Dashboard</button>

    <div id="arsenal-nav">
        <button id="prev-part">&larr; Previous</button>
        <button id="next-part">Next &rarr;</button>
    </div>

    <div id="loading">Loading Model...</div>
    <div id="scroll-indicator">Scroll down to inspect &darr;</div>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import anime from 'animejs';

        // --- CONFIGURATION VARIABLES ---
        // Tweak these values (in radians) to change the initial rotation of the model. 
        // e.g. Math.PI = 180 degrees, Math.PI / 2 = 90 degrees
        const MODEL_ROTATION_X = Math.PI ; // 90 degrees on the X-axis
        const MODEL_ROTATION_Y = Math.PI / 2.5; // Rotate around so it faces the camera
        const MODEL_ROTATION_Z = Math.PI ; // Adjust Z to bring the gripper front
        // -------------------------------

        // 1. Scene Setup
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 2, 7); // Moved camera back slightly to see wide parts

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.0; 
        document.body.appendChild(renderer.domElement);

        // Add OrbitControls so you can pan around the model
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;

        // Lighting - Fix the black model by using DirectionalLights instead of just point lights
        const ambientLight = new THREE.AmbientLight(0xffffff, 2.0); // Safe ambient
        scene.add(ambientLight);

        const hemiLight = new THREE.HemisphereLight(0xffffff, 0x444444, 2.0); 
        hemiLight.position.set(0, 50, 0);
        scene.add(hemiLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 3.0);
        dirLight.position.set(5, 10, 10);
        scene.add(dirLight);
        
        const dirLight2 = new THREE.DirectionalLight(0xffffff, 2.0);
        dirLight2.position.set(-5, -5, -5);
        scene.add(dirLight2);

        // Label Container
        const labelContainer = document.createElement('div');
        labelContainer.style.position = 'fixed';
        labelContainer.style.top = '0';
        labelContainer.style.left = '0';
        labelContainer.style.width = '100vw';
        labelContainer.style.height = '100vh';
        labelContainer.style.pointerEvents = 'none';
        labelContainer.style.zIndex = '50';
        document.body.appendChild(labelContainer);

        // 2. Load the Model
        let modelParts = [];
        const loader = new GLTFLoader();

        // MAKE SURE THIS PATH MATCHES YOUR FILE NAME EXACTLY
        loader.load('/models/my_model.glb', (gltf) => {
            const model = gltf.scene;
            
            // Center the model in the scene
            const box = new THREE.Box3().setFromObject(model);
            const center = box.getCenter(new THREE.Vector3());
            model.position.sub(center); 
            
            // Apply the initial rotation configuration variables defined at the top
            model.rotation.x = MODEL_ROTATION_X;
            model.rotation.y = MODEL_ROTATION_Y;
            model.rotation.z = MODEL_ROTATION_Z;

            scene.add(model);

            // Extract parts and store initial states
            const excludeTokens = [
                '014','074','073','072','071','070','067','069','068','066','065','064',
                '025','041','042','043','044','045','046','047','048','049','050','051',
                '052','053','054','055','056','057','058','019','075','088',
                '32_2','32_3','plane-1','Plane-1','21_2','021_2'
            ];

            model.traverse((child) => {
                if (child.isMesh) {
                    // Check if part should be excluded to reduce clutter
                    const isExcluded = excludeTokens.some(token => child.name.includes(token) || child.name.toLowerCase().includes(token.toLowerCase()));
                    if (isExcluded) {
                        child.visible = false;
                        return; // Skip adding to animation pipeline
                    }

                    // Clone the position/rotation so we have a permanent record of the original state
                    child.userData.originalPosition = child.position.clone();
                    child.userData.originalRotation = child.rotation.clone();
                    modelParts.push(child);

                    // Create Label
                    const label = document.createElement('div');
                    label.innerText = child.name || 'Component';
                    label.style.position = 'absolute';
                    label.style.color = '#fff';
                    label.style.background = 'rgba(0, 200, 200, 0.85)';
                    label.style.padding = '4px 10px';
                    label.style.borderRadius = '20px';
                    label.style.fontSize = '12px';
                    label.style.fontWeight = 'bold';
                    label.style.opacity = '0';
                    label.style.transition = 'opacity 0.3s ease';
                    label.style.transform = 'translate(-50%, 25px)'; // Shifted down 25px below part
                    label.style.boxShadow = '0 2px 8px rgba(0,0,0,0.5)';
                    labelContainer.appendChild(label);
                    child.userData.labelElement = label;
                    
                    // Clone emissive map for highlighting
                    if (child.material) {
                        child.userData.originalEmissive = child.material.emissive ? child.material.emissive.clone() : new THREE.Color(0x000000);
                    }
                }
            });

            // Hide loading text
            document.getElementById('loading').style.display = 'none';

            // Now that the model is rotated 90 degrees (Y-axis), its original local "X" is now facing us/away from us (Z).
            // Its original local "Z" is now spanning left and right (X). 
            // So to open on both sides visually (left/right on screen), we sort and push along local Z.
            modelParts.sort((a, b) => Math.abs(b.position.z) - Math.abs(a.position.z));

            // CREATE A MASTER EXPLOSION TIMELINE
            explosionTimeline = anime.timeline({
                autoplay: false, 
                duration: 6000, 
                easing: 'linear' 
            });

            // Grid variables for the "arsenal" layout
            const cols = 4; // 4 columns
            const spacingX = 4.0; // Widened significantly to keep parts separated
            const spacingY = 4.0; 
            const startX = -((cols - 1) * spacingX) / 2;
            const startY = ((Math.ceil(modelParts.length / cols) - 1) * spacingY) / 2 - 1.5; // Offset slightly down

            // Loop through sorted parts to add sequenced animations
            modelParts.forEach((part, index) => {
                const startTimeOffset = index * 100; // Faster stagger so user isnt scrolling forever
                
                // Calculate grid position
                const col = index % cols;
                const row = Math.floor(index / cols);

                // Because the master model is rotated X=90 and Y=180:
                // World X (left/right) is Local -X
                // World Y (up/down) is Local Z
                // World Z (forward/back) is Local -Y
                
                let targetWorldX = startX + (col * spacingX);
                let targetWorldY = startY - (row * spacingY);

                // Manual Overrides: Stack these specific parts vertically in order
                if (part.name.includes('Plane036')) {
                    targetWorldX = -8.0; // Try X-axis offset
                    targetWorldY = 0.0;
                } else if (part.name.includes('Plane039')) {
                    targetWorldX = 0.0;
                    targetWorldY = 0.0;
                } else if (part.name.includes('Plane037')) {
                    targetWorldX = 8.0;
                    targetWorldY = 0.0;
                }

                const targetLocalX = -targetWorldX;
                const targetLocalY = -2.0; // Pull it forward toward the camera
                const targetLocalZ = targetWorldY;

                // Add clean, precise sideway movement to a grid position
                explosionTimeline.add({
                    targets: part.position,
                    x: targetLocalX,
                    y: targetLocalY,
                    z: targetLocalZ,
                    duration: 3000, 
                    easing: 'easeInOutCubic' 
                }, startTimeOffset);
                
                // Also rotate parts to a neutral orientation so we can see them clearly like an arsenal
                explosionTimeline.add({
                    targets: part.rotation,
                    x: 0,
                    y: 0,
                    z: 0,
                    duration: 3000,
                    easing: 'easeInOutCubic'
                }, startTimeOffset);
            });

        }, undefined, (error) => {
            console.error('Error loading model:', error);
            document.getElementById('loading').innerText = 'Error loading model. Check console.';
        });

        // 3. Animation Logic
        let explosionTimeline; // AnimeJS instance holder
        let targetProgress = 0; // Value between 0 (assembled) and 1 (dismantled)
        let activeProgress = 0; // Current lerped value
        
        let currentFocusIndex = 0;
        
        // Navigation Buttons
        document.getElementById('next-part').addEventListener('click', () => {
            if (modelParts.length > 0) {
                currentFocusIndex = (currentFocusIndex + 1) % modelParts.length;
            }
        });
        
        document.getElementById('prev-part').addEventListener('click', () => {
            if (modelParts.length > 0) {
                currentFocusIndex = (currentFocusIndex - 1 + modelParts.length) % modelParts.length;
            }
        });
        
        window.addEventListener('keydown', (e) => {
            if (document.getElementById('arsenal-nav').style.display === 'flex') {
                if (e.key === 'ArrowRight') document.getElementById('next-part').click();
                if (e.key === 'ArrowLeft') document.getElementById('prev-part').click();
            }
        });

        // Map scroll position to disassembly Level instead of mouse distance
        window.addEventListener('scroll', () => {
            if (!explosionTimeline) return;

            const scrollPos = window.scrollY;
            
            // Calculate total scrollable height
            const maxScroll = document.body.scrollHeight - window.innerHeight;
            
            // Clamp it between 0.0 (top) and 1.0 (bottom of page)
            const scrollPercentage = scrollPos / maxScroll;
            targetProgress = Math.max(0, Math.min(1, scrollPercentage));
            
            // Toggle Arsenal mode Navigation UI when fully scrolled
            if (targetProgress >= 0.99) {
                document.getElementById('arsenal-nav').style.display = 'flex';
                document.getElementById('scroll-indicator').style.display = 'none';
            } else {
                document.getElementById('arsenal-nav').style.display = 'none';
                document.getElementById('scroll-indicator').style.display = 'block';
            }
        });

        // 4. Render Loop & Window Resizing
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        function animate() {
            requestAnimationFrame(animate);
            
            const time = Date.now() * 0.002;
            
            // Lerp active progress smoothly towards target progress based on scroll distance
            if (explosionTimeline) {
                activeProgress += (targetProgress - activeProgress) * 0.05;
                explosionTimeline.seek(activeProgress * explosionTimeline.duration);

                if (targetProgress >= 0.99 && modelParts.length > 0) {
                    const focusedPart = modelParts[currentFocusIndex];
                    if (focusedPart) {
                        // Apply procedural float and spin safely
                        focusedPart.rotation.y += 0.01; // Constant slow spin
                        // Calculate ideal camera position (offset from the part for zoom)
                        const offset = new THREE.Vector3(0, 1.5, 8.0); // Pushed back significantly and angled down 

                        // Camera follow logic
                        const targetPos = new THREE.Vector3();
                        focusedPart.getWorldPosition(targetPos);
                        
                        // Lerp camera and controls for smooth transition
                        controls.target.lerp(targetPos, 0.08); // Pan looking at the target
                        
                        const idealCameraPos = targetPos.clone().add(offset);
                        camera.position.lerp(idealCameraPos, 0.08); // Zoom smoothly
                    }
                } else if (targetProgress < 0.95 && activeProgress < 0.95) {
                    // Reset camera to default wide overview when scrolling back up
                    controls.target.lerp(new THREE.Vector3(0, 0, 0), 0.05);
                    camera.position.lerp(new THREE.Vector3(0, 2, 7), 0.05);
                }

                // Update Labels and Highlights based on Arsenal state
                modelParts.forEach((part, idx) => {
                    const el = part.userData.labelElement;
                    if (!el) return;

                    let shouldShowLabel = false;
                    
                    if (targetProgress >= 0.99) {
                        // At maximum scroll - Arsenal Interaction Mode
                        if (idx === currentFocusIndex) {
                            shouldShowLabel = true;
                            if (part.material) part.material.emissive = new THREE.Color(0x007777); // Give it a glowing cyan outline
                        } else {
                            if (part.material && part.userData.originalEmissive) {
                                part.material.emissive = part.userData.originalEmissive;
                            }
                        }
                    } else {
                        // While scrolling, hide all labels and reset emissions
                        shouldShowLabel = false;
                        if (part.material && part.userData.originalEmissive) {
                            part.material.emissive = part.userData.originalEmissive;
                        }
                    }

                    // Display Logic
                    if (shouldShowLabel) {
                        el.style.opacity = '1';
                        
                        const vector = new THREE.Vector3();
                        part.getWorldPosition(vector);
                        vector.project(camera);
                        
                        const x = (vector.x * 0.5 + 0.5) * window.innerWidth;
                        const y = (-(vector.y * 0.5) + 0.5) * window.innerHeight;
                        
                        if (vector.z < 1) {
                            el.style.left = `${x}px`;
                            el.style.top = `${y}px`;
                        } else {
                            el.style.opacity = '0';
                        }
                    } else {
                        el.style.opacity = '0';
                    }
                });
            }

            controls.update(); // MUST be called after shifting controls.target
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
