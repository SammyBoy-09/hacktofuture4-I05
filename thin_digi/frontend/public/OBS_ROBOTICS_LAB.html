<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Dismantle Animation Test</title>
    <style>
        body { 
            margin: 0; 
            /* To allow scrolling, we need a tall body. Let's make it 3 screens tall. */
            height: 300vh; 
            background: radial-gradient(circle at 50% 50%, #5a5a5a, #2b2b2b); /* Blender-style viewport background */
            font-family: sans-serif;
            overflow-x: hidden;
        }

        /* Fix the 3D canvas to the screen so it doesn't scroll away */
        canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
            pointer-events: auto; /* Let OrbitControls still work for panning/rotating */
        }

        /* Optional: Add a scroll indicator styling */
        #scroll-indicator {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: #ffffff;
            font-size: 16px;
            opacity: 0.8;
            pointer-events: none;
            animation: bounce 2s infinite;
        }
        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% { transform: translateY(0) translateX(-50%); }
            40% { transform: translateY(-15px) translateX(-50%); }
            60% { transform: translateY(-7px) translateX(-50%); }
        }
        #ui-container { 
            position: absolute; 
            bottom: 30px; 
            left: 50%; 
            transform: translateX(-50%); 
            display: flex; 
            gap: 15px; 
            z-index: 10; 
        }
        button { 
            padding: 12px 24px; 
            font-size: 16px; 
            cursor: pointer; 
            border: none; 
            border-radius: 6px; 
            background: #ffffff; 
            color: #1a1a1a; 
            font-weight: bold; 
            transition: 0.2s ease;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        button:hover { 
            background: #e0e0e0; 
            transform: translateY(-2px); 
        }
        #loading { 
            position: absolute; 
            top: 50%; 
            left: 50%; 
            transform: translate(-50%, -50%); 
            color: white; 
            font-size: 20px; 
        }
        #back-to-dashboard {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 100;
            padding: 10px 20px;
            font-size: 14px;
            cursor: pointer;
            border: none;
            border-radius: 6px;
            background: #00c8c8;
            color: #000;
            font-weight: bold;
            transition: 0.2s ease;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        #back-to-dashboard:hover {
            background: #00e8e8;
            transform: translateY(-2px);
        }
    </style>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/",
                "animejs": "https://cdn.jsdelivr.net/npm/animejs@3.2.2/lib/anime.es.js"
            }
        }
    </script>
</head>
<body>
    
    <button id="back-to-dashboard" onclick="window.top.location.href='/'">Back to Dashboard</button>

    <div id="loading">Loading Model...</div>
    <div id="scroll-indicator">Scroll down to inspect &darr;</div>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import anime from 'animejs';

        // --- CONFIGURATION VARIABLES ---
        // Tweak these values (in radians) to change the initial rotation of the model. 
        // e.g. Math.PI = 180 degrees, Math.PI / 2 = 90 degrees
        const MODEL_ROTATION_X = 0;
        const MODEL_ROTATION_Y = Math.PI / 2; // Set to 0, Math.PI, Math.PI/2, etc. to find the perfect front view
        const MODEL_ROTATION_Z = 0;
        // -------------------------------

        // 1. Scene Setup
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 2, 7); // Moved camera back slightly to see wide parts

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.2; // Bumped exposure to make colors pop brighter
        document.body.appendChild(renderer.domElement);

        // Add OrbitControls so you can pan around the model
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;

        // Lighting - Enhanced Studio environment for max vibrancy
        const ambientLight = new THREE.AmbientLight(0xffffff, 2.5); // Very bright ambient
        scene.add(ambientLight);

        const hemiLight = new THREE.HemisphereLight(0xffffff, 0xe0e0e0, 2.5); 
        hemiLight.position.set(0, 50, 0);
        scene.add(hemiLight);

        // Surrounding Point Lights to highlight every small crevice
        const pointLight1 = new THREE.PointLight(0xffffff, 30, 50);
        pointLight1.position.set(5, 5, 5);
        scene.add(pointLight1);

        const pointLight2 = new THREE.PointLight(0xffffff, 30, 50);
        pointLight2.position.set(-5, 0, 5);
        scene.add(pointLight2);

        const pointLight3 = new THREE.PointLight(0xffaaaa, 20, 50); // Slight warm back fill
        pointLight3.position.set(0, 5, -5);
        scene.add(pointLight3);

        // 2. Load the Model
        let modelParts = [];
        const loader = new GLTFLoader();

        // MAKE SURE THIS PATH MATCHES YOUR FILE NAME EXACTLY
        loader.load('/models/my_model.glb', (gltf) => {
            const model = gltf.scene;
            
            // Center the model in the scene
            const box = new THREE.Box3().setFromObject(model);
            const center = box.getCenter(new THREE.Vector3());
            model.position.sub(center); 
            
            // Apply the initial rotation configuration variables defined at the top
            model.rotation.x = MODEL_ROTATION_X;
            model.rotation.y = MODEL_ROTATION_Y;
            model.rotation.z = MODEL_ROTATION_Z;

            scene.add(model);

            // Extract parts and store initial states
            model.traverse((child) => {
                if (child.isMesh) {
                    // Clone the position/rotation so we have a permanent record of the original state
                    child.userData.originalPosition = child.position.clone();
                    child.userData.originalRotation = child.rotation.clone();
                    modelParts.push(child);
                }
            });

            // Hide loading text
            document.getElementById('loading').style.display = 'none';

            // Now that the model is rotated 90 degrees (Y-axis), its original local "X" is now facing us/away from us (Z).
            // Its original local "Z" is now spanning left and right (X). 
            // So to open on both sides visually (left/right on screen), we sort and push along local Z.
            modelParts.sort((a, b) => Math.abs(b.position.z) - Math.abs(a.position.z));

            // CREATE A MASTER EXPLOSION TIMELINE
            explosionTimeline = anime.timeline({
                autoplay: false, 
                duration: 6000, // Very slow educational progression
                easing: 'linear' 
            });

            const spreadDistance = 3.5; // Enough distance for pieces to slide completely off the main body
            
            // Loop through sorted parts to add sequenced animations
            modelParts.forEach((part, index) => {
                // Delay between parts (e.g., outer parts fly off well before inner parts start)
                const startTimeOffset = index * 400; // VERY slow, methodical sequenced stagger
                
                const dirX = part.userData.originalPosition.x;
                const dirY = part.userData.originalPosition.y;
                const dirZ = part.userData.originalPosition.z;

                // Push outwards laterally on its local Z axis (which visually is left/right to us now)
                const offsetMultiplier = Math.sign(dirZ || 1); 

                // Add clean, precise sideway movement
                explosionTimeline.add({
                    targets: part.position,
                    z: dirZ + (offsetMultiplier * spreadDistance) + (dirZ * spreadDistance * 0.4), 
                    y: dirY + (modelParts.length - index) * 0.05, // Gentle lift so parts don't intersect
                    x: dirX + (dirX * 0.2), // Minimal forward/back drift
                    duration: 3500, // Extremely slow individual part transition
                    easing: 'easeInOutSine' 
                }, startTimeOffset);
            });

        }, undefined, (error) => {
            console.error('Error loading model:', error);
            document.getElementById('loading').innerText = 'Error loading model. Check console.';
        });

        // 3. Animation Logic
        let explosionTimeline; // AnimeJS instance holder
        let targetProgress = 0; // Value between 0 (assembled) and 1 (dismantled)
        let activeProgress = 0; // Current lerped value
        
        // Map scroll position to disassembly Level instead of mouse distance
        window.addEventListener('scroll', () => {
            if (!explosionTimeline) return;

            const scrollPos = window.scrollY;
            
            // Calculate total scrollable height. (The full body height minus what we currently see)
            const maxScroll = document.body.scrollHeight - window.innerHeight;
            
            // Clamp it between 0.0 (top) and 1.0 (bottom of page)
            const scrollPercentage = scrollPos / maxScroll;
            targetProgress = Math.max(0, Math.min(1, scrollPercentage));
        });

        // 4. Render Loop & Window Resizing
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        function animate() {
            requestAnimationFrame(animate);
            controls.update(); // Required for damping
            
            // Lerp active progress smoothly towards target progress based on scroll distance
            if (explosionTimeline) {
                // Keep the smooth inertial drag to reduce raw scrolling jumpiness
                activeProgress += (targetProgress - activeProgress) * 0.05;
                
                // Scrub the anime.js timeline
                explosionTimeline.seek(activeProgress * explosionTimeline.duration);
            }

            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
